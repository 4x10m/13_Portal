# ── AxiiomLab Portal — Dashboard central ────────────────
# Dashboard: Port 3223 | Tailscale: dashboard.dolly-tilapia.ts.net
# Homepage: Port 3012 | Tailscale: homepage.dolly-tilapia.ts.net
# ──────────────────────────────────────────────────────────
name: portal

services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    hostname: homepage
    restart: unless-stopped
    ports:
      - "3012:3000"
    volumes:
      - /home/docker/homepage/config:/app/config
      - /home/docker/homepage/icons:/app/public/icons
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - /home/docker/homepage/config/.env
    environment:
      HOMEPAGE_ALLOWED_HOSTS: "*"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  dashboard:
    build: ./dashboard
    container_name: axiiomlab-dashboard
    hostname: axiiomlab-dashboard
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3223:3000"
    volumes:
      - dashboard-data:/app/data
      - /home/debian/Codebase/1_infra/1_cloud_manager:/cloud-manager:ro
      - /home/debian/Codebase:/home/debian/Codebase:ro
      - /home/debian/.opencode/groudon-pricing-cache.json:/app/data/groudon/pricing-cache.json:ro
      - /home/debian/.local/share/opencode:/opencode:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - .env
    environment:
      - HOSTNAME=0.0.0.0
      - DATABASE_PATH=/app/data/dashboard.db
      - OPENCODE_DB_PATH=/opencode/opencode.db
      - CLOUD_MANAGER_SCRIPT=/cloud-manager/cloud_manager.sh
      - CODEBASE_DIR=/home/debian/Codebase
    networks:
      - default
      - mcp-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

networks:
  mcp-net:
    external: true

volumes:
  dashboard-data:
